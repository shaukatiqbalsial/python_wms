{% extends 'side.html' %}
{% load static %}
{% block content %}
{% for i in sup1 %}
<div class="page-wrapper">
<div class="content">
<div class="page-header">
<div class="page-title">
<h4>Supplier Management</h4>
<h6>Edit/Update Customer</h6>
</div>
</div>
<form action="{% url 'updatesupplier' i.id %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
<input type="hidden" name="ids" value="{{i.id}}">
<div class="card">
<div class="card-body">
<div class="row">
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Supplier Name</label>
<input type="text" name="name" value="{{i.sup_name}}">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Email</label>
<input type="text" name="email" value="{{i.sup_email}}">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" value="{{i.sup_phone}}">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Choose Country</label>
<select class="select" name="con">
<option value="{{i.sup_country}}">{{i.sup_country}}</option>    
<option>USA</option>
<option>UAE</option>
<option>Malaysia</option>
</select>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>City</label>
<select class="select" name="city">
<option value="{{i.sup_city}}" >{{i.sup_city}}</option>
<option>Peshawar</option>
<option>Islamabad</option>
<option>Karachi</option>
</select>
</div>
</div>
<div class="col-lg-9 col-12">
<div class="form-group">
<label>Address</label>
<input type="text" name="address" value="{{i.sup_address}}">
</div>
</div>
<div class="col-lg-12">
<div class="form-group">
<label>Description</label>
<textarea class="form-control" name="desc">{{i.sup_desc}} </textarea>
</div>
</div>
<div class="col-lg-12">
<div class="form-group">
<label> Avatar</label>
<div class="image-upload">
<input type="file" name="pic">
<div class="image-uploads">
<img src="assets/img/icons/upload.svg" alt="img">
<h4>Drag and drop a file to upload</h4>
</div>
</div>
</div>
</div>
<div class="col-lg-12">
<input type="submit" value="Update" class="btn btn-submit me-2"></a>
<a class="btn btn-cancel">Cancel</a>
</div>
</div>
</div>
</div>

</div>
</div>
</div>
</form>
{% endfor %}
{% endblock %}
