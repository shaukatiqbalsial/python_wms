{% extends 'side.html' %}
{% load static %}
{% block content %}


<div class="page-wrapper">
<div class="content">
<div class="page-header">
<div class="page-title">
<h4>Gate Pass Add</h4>
<h6>New Gate Pass</h6>
</div>
</div>
<form action="{% url 'gpassadd' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %} 

<div class="card">
<div class="card-body">
<div class="row">

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>ASN No.</label>
<select class="select" name="gpid" required>
    {% for i in frm %}
<option value="{{i.rec_asnno}}">{{i.rec_asnno}}</option>
    {% endfor %}
</select>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Driver Name</label>
<input type="text" name="name" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>CNIC No.</label>
<input type="text" name="cnic" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Mobile No.</label>
<input type="text" name="mobile" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Veh. Type (FT)</label>
<select class="select" name="type" required>
<option value="45">45</option>
<option value="40">40</option>
<option value="30">30</option>
<option value="20">20</option>
<option value="18">18</option>
<option value="16">16</option>
<option value="14">14</option>
<option value="Pickup">Pikup</option>
<option value="Other">Other</option>
</select>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Bilty</label>
<input type="text" name="bilty" required>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Seal No.</label>
<input type="text" name="seal">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Veh. Temprature</label>
<input type="text" name="vehtemp" required>
</div>
</div>
<div class="col-lg-12">
<div class="form-group">
<label>Remarks</label>
<textarea class="form-control" name="rem"></textarea>
</div>
</div>
