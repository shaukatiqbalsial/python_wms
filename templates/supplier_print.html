<!DOCTYPE html>
<html>
<head>
    <title>Supplier Print List</title>
    <style>
        body { font-family: Arial; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 8px; }
        th { background: #eee; }
        @media print {
            .noprint { display: none; }
        }
    </style>
</head>
<body>

<h2>Supplier List</h2>

<button class="noprint" onclick="window.print()">Print</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Country</th>
            <th>City</th>
        </tr>
    </thead>
    <tbody>
        {% for s in sup %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.sup_name }}</td>
            <td>{{ s.sup_email }}</td>
            <td>{{ s.sup_phone }}</td>
            <td>{{ s.sup_country }}</td>
            <td>{{ s.sup_city }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
