{% extends 'side.html' %}
{% load static %}
{% block content %}


<div class="page-wrapper">
<div class="content">
<div class="page-header">
<div class="page-title">
<h4>Gate Pass Add</h4>
<h6>New Gate Pass</h6>
</div>
</div>
<form action="{% url 'productadd' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %} 

<div class="card">
<div class="card-body">
<div class="row">
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Product Name</label>
<input type="text" name="name" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Code</label>
<input type="text" name="code" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Size</label>
<input type="text" name="volume" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>UOM</label>
<input type="text" name="uom" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Unit</label>
<select class="select" name="branch" required>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Supplier</label>
<select class="select" name="supid" required>
    {% for i in sup %}
<option value="{{i.id}}">{{i.sup_name}}</option>
    {% endfor %}
</select>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Weight</label>
<input type="text" name="weight">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Quantity</label>
<input type="text">
</div>
</div>
<div class="col-lg-12">
<div class="form-group">
<label>Description</label>
<textarea class="form-control"></textarea>
</div>
</div>
<!--

<option>2%</option>
</select>
</div>
</div>

</div>

<div class="col-lg-12">
<div class="form-group">
<label> Product Image</label>
<div class="image-upload">
<input type="file" name="image">
<div class="image-uploads">
<img src="{% static 'img/icons/upload.svg' %}" alt="img">
<h4>Drag and drop a file to upload</h4>
</div>
</div>
</div>
</div>
<div class="col-lg-12">
<input type="submit" value="Submit" class="btn btn-submit me-2">
<a href="productlist.html" class="btn btn-cancel">Cancel</a>
</div>
</div>
</div>
</div>
</form>

<label>Import Product Excel File</label>
<form action="{% url 'uploadproduct' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="file" required>
    <input type="submit" value="submit">
</form>

<form method="get" action="{% url 'export_product_excel' %}">
    <button type="submit">Export to Excel</button>
</form>

</div>
</div>


{% endblock %}
