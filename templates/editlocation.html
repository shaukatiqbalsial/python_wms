{% extends 'side.html' %}
{% load static %}
{% block content %}

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<div class="page-wrapper">
<div class="content">
<div class="page-header">
<div class="page-title">
<h4>Location</h4>
<h6>Location ASN No. {{pod1.rec_asnno}} - Damage QTY -  {{pod1.cond_qty}}</h6>
</div>
</div>
<form action="{% url 'updatelocation' pod1.id %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
<div class="card">
<div class="card-body">
<div class="row">
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Product Name</label>
<input type="text" name="name" value="{{prod_name}}" disabled>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Code</label>
<input type="text" name="prod_id" value="{{pod1.prod_id}}" disabled>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Batch</label>
<input type="text" name="batch_id" value="{{pod1.batch}}" disabled>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Alocate QTY</label>
<input type="text" name="asnqty" value="{{ pod1.location }} / {{ pod1.qty }}" disabled>
<input type="hidden" name="stid" value="{{ pod1.rec_asnno }}">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>M.F.G</label>
<input type="date" name="mfg_dat" value="{{pod1.mfg}}" disabled>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Expiry</label>
<input type="date" name="expiry_dat" value="{{pod1.expiry}}" disabled>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Location QTY</label>
<input type="number" name="recqty" step="0.01" min="0" autofocus required>
</div>
</div>


<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Location</label>
<input type="text" name="location"  required>
</div>
</div>

<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Status</label>
<select class="select" name="status">
<option value="Good">Good</option>
<option value="Damage">Damage</option>
</select>
</div>
</div>

<div class="form-group">
