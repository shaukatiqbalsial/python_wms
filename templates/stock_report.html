<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }

    .top-nav {
      background: linear-gradient(135deg, #1a3c5e, #2a5f96);
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .top-nav .brand { color: #fff; font-size: 1.1rem; font-weight: 700; }
    .top-nav .sub   { color: rgba(255,255,255,.65); font-size: .8rem; margin-left: auto; }

    .filter-card {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin: 1.25rem 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .filter-card label {
      font-size: .75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .5px;
      display: block;
      margin-bottom: .35rem;
    }
    .filter-card select {
      min-width: 300px;
      border: 1px solid #dde3ec;
      border-radius: 7px;
      padding: .55rem .9rem;
      font-size: .9rem;
      color: #1e293b;
      background: #fff;
    }
    .filter-card select:focus {
      border-color: #0ea5e9;
      outline: none;
      box-shadow: 0 0 0 3px rgba(14,165,233,.15);
    }
    .btn-view {
      background: #1a3c5e;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: .55rem 1.3rem;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .btn-view:hover { background: #2a5f96; }

    .placeholder-box {
      margin: 2rem 1.5rem;
      padding: 3rem;
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 12px;
      text-align: center;
      color: #94a3b8;
    }
    .placeholder-box i { font-size: 3rem; display: block; margin-bottom: 1rem; color: #0ea5e9; opacity: .6; }
  </style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <i class="bi bi-box-seam text-white fs-5"></i>
  <span class="brand">Sovereign Warehouse</span>
  <span class="sub">Stock Report — Customer Basis</span>
</nav>

<!-- Filter / Select Customer -->
<div class="filter-card">
  <form method="POST" action="">
    {% csrf_token %}
    <div>
      <label for="supplier_id">
        <i class="bi bi-person-lines-fill"></i> Select Customer
      </label>
      <select name="supplier_id" id="supplier_id">
        <option value="">— Choose Customer —</option>
        {% for s in sup %}
          <option value="{{ s.id }}">{{ s.sup_name }}</option>
        {% endfor %}
      </select>
    </div>
 
    <button type="submit" class="btn-view">
      <i class="bi bi-search"></i> View Stock
    </button>
  </form>
</div>

<!-- Placeholder -->
<div class="placeholder-box">
  <i class="bi bi-clipboard-data"></i>
  <h5 style="color:#1a3c5e; font-weight:700;">Available Stock Report</h5>
  <p>Select a customer above and click <strong>View Stock</strong> to load the report.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
