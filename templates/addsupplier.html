{% extends 'side.html' %}
{% load static %}
{% block content %}

<div class="page-wrapper">
<div class="content">
<div class="page-header">
<div class="page-title">
<h4>Supplier Management</h4>
<h6>Add/Update Customer</h6>
</div>
</div>
<form action="{% url 'supplieradd' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %} 

<div class="card">
<div class="card-body">
<div class="row">
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Supplier Name</label>
<input type="text" name="name" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group"  required>
<label>Email</label>
<input type="text" name="email">
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" required>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>Choose Country</label>
<select class="select" name="con" required>
<option>Choose Country</option>
<option>Pakistan</option>
</select>
</div>
</div>
<div class="col-lg-3 col-sm-6 col-12">
<div class="form-group">
<label>City</label>
<input type="text" name="city" required>
</div>
</div>
<div class="col-lg-9 col-12">
<div class="form-group">
<label>Address</label>
<input type="text" name="address" required>
</div>
</div>
<div class="col-lg-12">
<div class="form-group">
<label>Description</label>
<textarea class="form-control" name="desc"></textarea>
</div>
</div>
<div class="col-lg-12">
<div class="form-group">
<label> Avatar</label>
<div class="image-upload">
<input type="file" name="image">
<div class="image-uploads">
<img src="assets/img/icons/upload.svg" alt="img">
<h4>Drag and drop a file to upload</h4>
</div>
</div>
</div>
</div>
<div class="col-lg-12">
<input type="submit" method="post" class="btn btn-submit me-2" value="Submit">
<a href="javascript:void(0);" class="btn btn-cancel">Cancel</a>
</div>
</div>
</div>
</div>
</form>
<label>Import Supplier Excel File</label>
<form action="{% url 'uploadperson' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="file" required>
    <input type="submit" value="submit">
</form>

<form method="get" action="{% url 'export_supplier_excel' %}">
    <button type="submit">Export to Excel</button>
</form>



</div>
</div>



{% endblock %}
